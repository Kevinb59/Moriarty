<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- ==========================================================================
         Bloc SEO principal (balises générales)
         Purpose: Poser une base SEO complète alignée sur le site en production.
         Key variables: title, description, keywords, robots, canonical.
         Logic flow: moteurs lisent ces balises en premier pour indexation et snippet.
         ========================================================================== -->
    <title>Moriarty - Création de Sites Web Professionnels | Studio Web</title>
    <meta
      name="description"
      content="Création de sites web professionnels sur-mesure pour particuliers, entrepreneurs et artisans. Sites vitrine, e-commerce, applications web. Prix abordables, résultats professionnels."
    />
    <meta
      name="keywords"
      content="création site web, studio web, site vitrine, e-commerce, application web, web design, référencement SEO, hébergement web, nom de domaine"
    />
    <meta name="author" content="Moriarty - Studio Web" />
    <meta name="robots" content="index, follow" />
    <meta name="language" content="French" />
    <meta name="revisit-after" content="7 days" />
    <meta name="distribution" content="global" />
    <meta name="rating" content="general" />
    <link rel="canonical" href="https://www.moriarty-design.fr/" />
    <meta
      name="google-site-verification"
      content="Xw-8Qd33KtH9ZHkhSjMIkw5Qh_IthEsU0mbhwjx3zjk"
    />
    <!-- ==========================================================================
         Bloc Open Graph (partage social)
         Purpose: Contrôler l'aperçu lors du partage Facebook/LinkedIn/WhatsApp.
         Key variables: og:title, og:description, og:image, og:url.
         Logic flow: les plateformes lisent ces tags pour générer la carte sociale.
         ========================================================================== -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://www.moriarty-design.fr/" />
    <meta
      property="og:title"
      content="Moriarty - Création de Sites Web Professionnels | Studio Web"
    />
    <meta
      property="og:description"
      content="Création de sites web professionnels sur-mesure pour particuliers, entrepreneurs et artisans. Sites vitrine, e-commerce, applications web. Prix abordables, résultats professionnels."
    />
    <meta
      property="og:image"
      content="https://www.moriarty-design.fr/media/og-image.jpg"
    />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:locale" content="fr_FR" />
    <meta property="og:site_name" content="Moriarty" />
    <!-- ==========================================================================
         Bloc Twitter Card (partage X/Twitter)
         Purpose: Garantir un rendu riche et cohérent du lien sur Twitter/X.
         Key variables: twitter:card, twitter:title, twitter:description, twitter:image.
         Logic flow: Twitter lit ces tags pour construire la carte d'aperçu.
         ========================================================================== -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:url" content="https://www.moriarty-design.fr/" />
    <meta
      property="twitter:title"
      content="Moriarty - Création de Sites Web Professionnels"
    />
    <meta
      property="twitter:description"
      content="Création de sites web professionnels sur-mesure pour particuliers, entrepreneurs et artisans. Prix abordables, résultats professionnels."
    />
    <meta
      property="twitter:image"
      content="https://www.moriarty-design.fr/media/twitter-card.jpg"
    />
    <!-- ==========================================================================
         Données structurées Schema.org (JSON-LD)
         Purpose: Aider Google à comprendre l’activité locale et les services.
         Key variables: LocalBusiness, coordonnées, zone desservie, catalogue.
         Logic flow: le script JSON-LD est parsé par les robots pour enrichir les SERP.
         ========================================================================== -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "LocalBusiness",
        "name": "Moriarty",
        "description": "Création de sites web professionnels sur-mesure pour particuliers, entrepreneurs et artisans",
        "url": "https://www.moriarty-design.fr",
        "logo": "https://www.moriarty-design.fr/media/moriarty-logo.svg",
        "image": "https://www.moriarty-design.fr/media/header-json.jpg",
        "telephone": "+33-7-70-34-43-32",
        "email": "moriarty.webdesigner@gmail.com",
        "address": {
          "@type": "PostalAddress",
          "addressCountry": "FR",
          "addressLocality": "Douai",
          "addressRegion": "Nord-Pas-de-Calais",
          "postalCode": "59500"
        },
        "openingHours": "Mo-Sa 09:00-20:00",
        "priceRange": "€€",
        "serviceType": [
          "Création de sites web",
          "Sites vitrines",
          "Sites évolutifs",
          "Réservation en ligne",
          "E-commerce",
          "Applications web sur-mesure",
          "Identité visuelle",
          "Création de logo et emblème",
          "Supports imprimés",
          "Objets et produits personnalisés",
          "SEO et visibilité Google",
          "Optimisation de fiche établissement Google",
          "Automatisations métier",
          "Maintenance et assistance"
        ],
        "areaServed": "France",
        "hasOfferCatalog": {
          "@type": "OfferCatalog",
          "name": "Services Web",
          "itemListElement": [
            {
              "@type": "Offer",
              "itemOffered": {
                "@type": "Service",
                "name": "Vitrine",
                "description": "Un site clair, rapide et élégant pour présenter votre activité, vos services et vos coordonnées."
              }
            },
            {
              "@type": "Offer",
              "itemOffered": {
                "@type": "Service",
                "name": "Évolutif",
                "description": "Un site pensé pour grandir avec votre activité, avec des contenus que vous pouvez modifier ou faire évoluer plus facilement."
              }
            },
            {
              "@type": "Offer",
              "itemOffered": {
                "@type": "Service",
                "name": "Planning",
                "description": "Une solution pour recevoir des demandes de réservation, proposer des créneaux disponibles et automatiser les confirmations."
              }
            },
            {
              "@type": "Offer",
              "itemOffered": {
                "@type": "Service",
                "name": "E-commerce",
                "description": "Une solution pour vendre vos produits en ligne avec catalogue administrable, panier, paiement sécurisé et suivi des commandes."
              }
            },
            {
              "@type": "Offer",
              "itemOffered": {
                "@type": "Service",
                "name": "Web APP",
                "description": "Une application sur-mesure pour piloter toute votre activité."
              }
            }
          ]
        }
      }
    </script>
    <!-- ==========================================================================
         Fonts loading optimization
         Purpose: Réduire la latence de chargement des polices Google.
         Key variables: preconnect domains + stylesheet unique.
         Logic flow: préconnexion -> récupération CSS fonts côté head.
         ========================================================================== -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700&family=Cormorant+Garamond:wght@600;700&family=Engagement&family=Exo+2:wght@700;800&family=Great+Vibes&family=Montserrat:wght@600;700;800&family=Orbitron:wght@700;800&display=swap"
    />
    <!-- ==========================================================================
         Favicon principal du site
         Purpose: Afficher l’icône de marque dans l’onglet navigateur.
         Key variables: chemin public /media/favicon.ico servi par Vite.
         Logic flow: le navigateur lit cette balise dès le chargement du head.
         ========================================================================== -->
    <link rel="icon" type="image/x-icon" href="/media/favicon.ico" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
  </html>
